server {
  listen 80;
  proxy_set_header X-Request-Id $http_x_request_id;
  
  location / {
    root /usr/share/nginx/html;
    index index.html;
  }

  location = /api/arch {
    default_type application/json;
    add_header Cache-Control "no-store";
    return 200 '{"arch":"nanoservices-compose architecture","component":"gateway"}';
  }

  location = /api/ping {
    default_type application/json;
    add_header Cache-Control "no-store";
    return 200 '{"ok":true}';
  }

  location = /api/checkout {
    proxy_pass http://checkout-service:3001/checkout;
  }
}
